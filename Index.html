<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Calculadora Científica Nexus | PWA</title>
    
    <!-- PWA Manifest e configurações -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f1a2b">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="NexusCalc">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(ellipse at 40% 30%, #0a0f1e, #03060c);
            font-family: 'Inter', 'Segoe UI', 'Poppins', system-ui, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            position: relative;
        }

        /* fundo com partículas sutis */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background-image: radial-gradient(rgba(30, 144, 255, 0.1) 1px, transparent 1px);
            background-size: 32px 32px;
            pointer-events: none;
        }

        /* container premium flutuante */
        .cosmic-card {
            max-width: 780px;
            width: 100%;
            background: rgba(12, 20, 32, 0.65);
            backdrop-filter: blur(20px);
            border-radius: 64px;
            border: 1px solid rgba(255, 255, 255, 0.18);
            box-shadow: 0 30px 50px -20px rgba(0, 0, 0, 0.6), inset 0 1px 1px rgba(255, 255, 255, 0.08);
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            overflow: hidden;
        }

        /* header com relógio e saudação */
        .glass-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 28px;
            background: rgba(0, 0, 0, 0.25);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            flex-wrap: wrap;
            gap: 16px;
        }

        .time-panel {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .digital-clock {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: 2px;
            background: linear-gradient(120deg, #eef5ff, #9bc5ff);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            text-shadow: 0 0 12px rgba(30,144,255,0.3);
        }

        .gregorian-date {
            font-size: 0.7rem;
            font-weight: 400;
            opacity: 0.7;
            letter-spacing: 0.5px;
        }

        /* saudação principal */
        .greeting-area {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(8px);
            padding: 8px 20px;
            border-radius: 60px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1px solid rgba(255, 255, 255, 0.12);
        }
        .greeting-area:hover {
            background: rgba(255, 255, 255, 0.12);
            transform: scale(1.02);
            border-color: rgba(30,144,255,0.4);
        }
        .greeting-icon {
            font-size: 1.3rem;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
        }
        .greeting-text {
            font-weight: 600;
            font-size: 1rem;
            white-space: nowrap;
        }
        .edit-hint {
            font-size: 0.7rem;
            opacity: 0.6;
        }

        /* barra de modo (RAD/DEG) */
        .mode-switch {
            display: flex;
            justify-content: flex-end;
            padding: 12px 28px 0 28px;
        }
        .mode-pill {
            background: rgba(0, 0, 0, 0.45);
            border-radius: 80px;
            padding: 4px 6px;
            display: inline-flex;
            gap: 8px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .mode-btn {
            padding: 6px 20px;
            border-radius: 60px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            color: #bbd9ff;
        }
        .mode-btn.active {
            background: #1e6fdf;
            color: white;
            box-shadow: 0 0 10px #1e6fdf80;
        }

        /* display premium */
        .display-section {
            padding: 16px 28px 12px 28px;
        }
        .calc-input {
            width: 100%;
            background: #03070fe6;
            border: none;
            padding: 22px 24px;
            font-size: 2rem;
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            font-weight: 500;
            color: #c9f0ff;
            text-align: right;
            border-radius: 48px;
            outline: none;
            box-shadow: inset 0 6px 12px rgba(0,0,0,0.5), 0 1px 0 rgba(255,255,255,0.05);
            letter-spacing: 1px;
            transition: all 0.2s;
        }
        .calc-input:focus {
            border: 1px solid #1e90ff88;
            background: #050c15;
        }

        /* grade de botões fluida */
        .button-palette {
            padding: 20px 28px 32px 28px;
        }
        .btn-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 12px;
        }
        .crystal-btn {
            background: rgba(20, 32, 55, 0.8);
            border: none;
            padding: 14px 0;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 600;
            color: #f2f9ff;
            cursor: pointer;
            transition: all 0.12s linear;
            backdrop-filter: blur(4px);
            box-shadow: 0 5px 10px rgba(0, 0, 0, 0.2), inset 0 1px 0 rgba(255,255,255,0.08);
            font-family: inherit;
        }
        .crystal-btn:active {
            transform: scale(0.94);
            background: #2a4b85;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.3);
        }
        .crystal-btn:hover {
            background: #2e5a8e;
            transform: translateY(-2px);
        }
        /* variações */
        .fn-btn {
            background: #1f4168cc;
            color: #d6edff;
        }
        .trig-btn {
            background: #1a5270cc;
        }
        .equal-btn {
            background: linear-gradient(135deg, #1976d2, #0f4c8a);
            box-shadow: 0 0 10px #1976d280;
            color: white;
        }
        .clear-btn {
            background: #882c44cc;
        }
        .del-btn {
            background: #6e402ecc;
        }
        .const-btn {
            background: #2a6b6bcc;
        }

        @media (max-width: 620px) {
            .btn-grid {
                gap: 8px;
            }
            .crystal-btn {
                font-size: 0.75rem;
                padding: 12px 0;
            }
            .calc-input {
                font-size: 1.4rem;
                padding: 16px 20px;
            }
            .digital-clock {
                font-size: 1.5rem;
            }
            .glass-header {
                padding: 14px 20px;
            }
        }
        .footer-note {
            font-size: 0.6rem;
            text-align: center;
            padding: 12px;
            opacity: 0.5;
            background: rgba(0,0,0,0.3);
            letter-spacing: 0.3px;
        }
    </style>
</head>
<body>
<div class="cosmic-card">
    <div class="glass-header">
        <div class="time-panel">
            <div class="digital-clock" id="liveClock">--:--:--</div>
            <div class="gregorian-date" id="liveDate"></div>
        </div>
        <div class="greeting-area" id="userGreetingTrigger">
            <span class="greeting-icon">✨</span>
            <span class="greeting-text" id="greetingMessage">Olá, Usuário</span>
            <span class="edit-hint">✎</span>
        </div>
    </div>

    <div class="mode-switch">
        <div class="mode-pill" id="modeTogglePanel">
            <span class="mode-btn" data-mode="rad">RAD</span>
            <span class="mode-btn" data-mode="deg">DEG</span>
        </div>
    </div>

    <div class="display-section">
        <input type="text" id="calcDisplay" class="calc-input" placeholder="0" autocomplete="off">
    </div>

    <div class="button-palette">
        <div class="btn-grid" id="buttonsContainer"></div>
    </div>
    <div class="footer-note">⌨️ Teclado ativo | Ans | Fatorial | Potência ^ | Modo RAD/DEG | PWA Offline</div>
</div>

<script>
    // ======================== DEFINIÇÕES GLOBAIS ===========================
    let currentMode = 'rad';       // 'rad' ou 'deg'
    let lastResult = 0;            // memória Ans
    const display = document.getElementById('calcDisplay');

    // ---------- SAUDAÇÃO PERSONALIZADA "Olá, usuário" ----------
    function updateGreetingMessage() {
        let storedName = localStorage.getItem('nexusUserName');
        let userName = (storedName && storedName.trim() !== "") ? storedName.trim() : "Usuário";
        document.getElementById('greetingMessage').innerText = `Olá, ${userName}`;
    }

    function setNewUserName() {
        let currentName = localStorage.getItem('nexusUserName') || "Usuário";
        let newName = prompt("Digite seu nome:", currentName === "Usuário" ? "" : currentName);
        if (newName === null) return;
        let finalName = newName.trim();
        if (finalName === "") {
            localStorage.removeItem('nexusUserName');
        } else {
            localStorage.setItem('nexusUserName', finalName);
        }
        updateGreetingMessage();
    }

    // evento clique na área de saudação
    document.getElementById('userGreetingTrigger').addEventListener('click', setNewUserName);
    
    // ======================== RELÓGIO + DATA ==========================
    function updateTimeAndDate() {
        const now = new Date();
        const timeStr = now.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        document.getElementById('liveClock').innerText = timeStr;
        const dateOpts = { weekday: 'short', year: 'numeric', month: 'short', day: 'numeric' };
        let dateStr = now.toLocaleDateString('pt-BR', dateOpts);
        dateStr = dateStr.charAt(0).toUpperCase() + dateStr.slice(1);
        document.getElementById('liveDate').innerText = dateStr;
    }
    setInterval(updateTimeAndDate, 1000);
    updateTimeAndDate();
    
    // ======================== FUNÇÕES MATEMÁTICAS =======================
    window.factorial = (n) => {
        let num = Number(n);
        if (isNaN(num) || !Number.isInteger(num) || num < 0) return NaN;
        if (num === 0 || num === 1) return 1;
        let res = 1;
        for (let i = 2; i <= num; i++) res *= i;
        return res;
    };
    window.log10 = (x) => Math.log10(x);
    window.ln = (x) => Math.log(x);
    window.expFn = (x) => Math.exp(x);
    // trigonométricas com graus
    window.sinDeg = (x) => Math.sin(x * Math.PI / 180);
    window.cosDeg = (x) => Math.cos(x * Math.PI / 180);
    window.tanDeg = (x) => Math.tan(x * Math.PI / 180);
    
    // pré-processamento seguro da expressão
    function sanitizeAndProcess(expr, mode) {
        let processed = expr.trim();
        if (processed === "") return "0";
        // trocar constantes
        processed = processed.replace(/π/g, 'Math.PI');
        processed = processed.replace(/\be\b/g, 'Math.E');
        // exponenciação
        processed = processed.replace(/\^/g, '**');
        // fatorial (número ou (expressão)!)
        processed = processed.replace(/(\d+(?:\.\d+)?|\([^()]+\))\!/g, (match, p1) => `factorial(${p1})`);
        // operador mod
        processed = processed.replace(/\bmod\b/g, '%');
        // funções científicas
        processed = processed.replace(/ln\(/g, 'ln(');
        processed = processed.replace(/log\(/g, 'log10(');
        processed = processed.replace(/sqrt\(/g, 'Math.sqrt(');
        processed = processed.replace(/cbrt\(/g, 'Math.cbrt(');
        processed = processed.replace(/exp\(/g, 'expFn(');
        
        if (mode === 'deg') {
            processed = processed.replace(/sin\(/g, 'sinDeg(');
            processed = processed.replace(/cos\(/g, 'cosDeg(');
            processed = processed.replace(/tan\(/g, 'tanDeg(');
        } else {
            processed = processed.replace(/sin\(/g, 'Math.sin(');
            processed = processed.replace(/cos\(/g, 'Math.cos(');
            processed = processed.replace(/tan\(/g, 'Math.tan(');
        }
        // segurança extra: não permitir código malicioso
        if (/[;`'"]/g.test(processed)) throw new Error("expressão inválida");
        return processed;
    }
    
    function evaluateExpression(expression) {
        try {
            let processed = sanitizeAndProcess(expression, currentMode);
            // Usar Function para avaliação segura (escopo restrito)
            const resultFunc = new Function('return (' + processed + ')');
            let rawResult = resultFunc();
            if (isNaN(rawResult) || !isFinite(rawResult)) throw new Error("Indefinido");
            return parseFloat(rawResult.toFixed(10));
        } catch (err) {
            console.warn(err);
            throw new Error("Erro");
        }
    }
    
    function calculateResult() {
        let expr = display.value;
        if (!expr.trim()) {
            display.value = "0";
            return;
        }
        try {
            let res = evaluateExpression(expr);
            lastResult = res;
            display.value = (Number.isInteger(res) ? res : parseFloat(res.toFixed(10))).toString();
        } catch (e) {
            display.value = "⚠️ Erro";
            setTimeout(() => {
                if (display.value === "⚠️ Erro") display.value = "";
            }, 1300);
        }
    }
    
    // funções de manipulação do display
    function appendToDisplay(value) {
        if (display.value === "⚠️ Erro") display.value = "";
        display.value += value;
    }
    function clearDisplay() { display.value = ""; }
    function clearEntry() { display.value = ""; }
    function backspaceDisplay() {
        if (display.value === "⚠️ Erro") clearDisplay();
        else display.value = display.value.slice(0, -1);
    }
    function insertAns() {
        if (display.value === "⚠️ Erro") display.value = "";
        display.value += lastResult;
    }
    function insertFunction(funcName) {
        if (display.value === "⚠️ Erro") display.value = "";
        display.value += funcName + "(";
    }
    function insertConstant(constVal) {
        if (display.value === "⚠️ Erro") display.value = "";
        display.value += constVal;
    }
    function insertPow2() {
        if (display.value === "⚠️ Erro") display.value = "";
        display.value += "^2";
    }
    
    // ======================== GERAR BOTÕES DINAMICAMENTE =================
    const buttonsConfig = [
        // linha 1: funções científicas + constantes + limpeza
        { label: "sin", type: "func", action: () => insertFunction("sin"), class: "trig-btn" },
        { label: "cos", type: "func", action: () => insertFunction("cos"), class: "trig-btn" },
        { label: "tan", type: "func", action: () => insertFunction("tan"), class: "trig-btn" },
        { label: "π", type: "const", action: () => insertConstant("π"), class: "const-btn" },
        { label: "e", type: "const", action: () => insertConstant("e"), class: "const-btn" },
        { label: "AC", type: "clear", action: clearDisplay, class: "clear-btn" },
        
        // linha 2: log / ln / raízes / potência 2 / backspace
        { label: "ln", type: "func", action: () => insertFunction("ln"), class: "fn-btn" },
        { label: "log₁₀", type: "func", action: () => insertFunction("log"), class: "fn-btn" },
        { label: "√", type: "func", action: () => insertFunction("sqrt"), class: "fn-btn" },
        { label: "∛", type: "func", action: () => insertFunction("cbrt"), class: "fn-btn" },
        { label: "x²", type: "func", action: insertPow2, class: "fn-btn" },
        { label: "⌫", type: "back", action: backspaceDisplay, class: "del-btn" },
        
        // linha 3: números + divisão + potência + fatorial
        { label: "7", type: "num", action: () => appendToDisplay("7") },
        { label: "8", type: "num", action: () => appendToDisplay("8") },
        { label: "9", type: "num", action: () => appendToDisplay("9") },
        { label: "÷", type: "op", action: () => appendToDisplay("/") },
        { label: "xʸ", type: "op", action: () => appendToDisplay("^") },
        { label: "n!", type: "func", action: () => appendToDisplay("!"), class: "fn-btn" },
        
        // linha 4
        { label: "4", type: "num", action: () => appendToDisplay("4") },
        { label: "5", type: "num", action: () => appendToDisplay("5") },
        { label: "6", type: "num", action: () => appendToDisplay("6") },
        { label: "×", type: "op", action: () => appendToDisplay("*") },
        { label: "(", type: "paren", action: () => appendToDisplay("(") },
        { label: ")", type: "paren", action: () => appendToDisplay(")") },
        
        // linha 5
        { label: "1", type: "num", action: () => appendToDisplay("1") },
        { label: "2", type: "num", action: () => appendToDisplay("2") },
        { label: "3", type: "num", action: () => appendToDisplay("3") },
        { label: "−", type: "op", action: () => appendToDisplay("-") },
        { label: "exp", type: "func", action: () => insertFunction("exp"), class: "fn-btn" },
        { label: "mod", type: "op", action: () => appendToDisplay(" mod "), class: "fn-btn" },
        
        // linha 6
        { label: "0", type: "num", action: () => appendToDisplay("0") },
        { label: ".", type: "num", action: () => appendToDisplay(".") },
        { label: "=", type: "equal", action: calculateResult, class: "equal-btn" },
        { label: "+", type: "op", action: () => appendToDisplay("+") },
        { label: "Ans", type: "ans", action: insertAns, class: "const-btn" },
        { label: "CE", type: "clear", action: clearEntry, class: "clear-btn" }
    ];
    
    function buildButtons() {
        const container = document.getElementById('buttonsContainer');
        container.innerHTML = "";
        buttonsConfig.forEach(btn => {
            const button = document.createElement('button');
            button.innerText = btn.label;
            let baseClass = "crystal-btn";
            if (btn.class) baseClass += " " + btn.class;
            else if (btn.type === "func") baseClass += " fn-btn";
            button.className = baseClass;
            button.addEventListener('click', (e) => {
                e.stopPropagation();
                btn.action();
            });
            container.appendChild(button);
        });
    }
    
    // ======================== MODO RAD/DEG ==========================
    function initModeToggle() {
        const radBtn = document.querySelector('.mode-btn[data-mode="rad"]');
        const degBtn = document.querySelector('.mode-btn[data-mode="deg"]');
        function setActive(mode) {
            currentMode = mode;
            if (mode === 'rad') {
                radBtn.classList.add('active');
                degBtn.classList.remove('active');
            } else {
                degBtn.classList.add('active');
                radBtn.classList.remove('active');
            }
        }
        radBtn.addEventListener('click', () => setActive('rad'));
        degBtn.addEventListener('click', () => setActive('deg'));
        setActive('rad'); // padrão
    }
    
    // ======================== SUPORTE A TECLADO ======================
    function handleKeyboard(e) {
        const key = e.key;
        const controlKeys = ['Enter', 'Backspace', 'Delete', 'Escape', '*', '/', '+', '-', '.', '(', ')', '^', '!'];
        if (controlKeys.includes(key) || /[0-9]/.test(key) || key === 'Enter') {
            e.preventDefault();
        }
        if (/[0-9]/.test(key)) appendToDisplay(key);
        else if (key === '.') appendToDisplay('.');
        else if (key === '+') appendToDisplay('+');
        else if (key === '-') appendToDisplay('-');
        else if (key === '*') appendToDisplay('*');
        else if (key === '/') appendToDisplay('/');
        else if (key === '^') appendToDisplay('^');
        else if (key === '(') appendToDisplay('(');
        else if (key === ')') appendToDisplay(')');
        else if (key === '!') appendToDisplay('!');
        else if (key === 'Enter') calculateResult();
        else if (key === 'Backspace') backspaceDisplay();
        else if (key === 'Delete' || key === 'Escape') clearDisplay();
        else if (key === 's') insertFunction('sin');
        else if (key === 'c') insertFunction('cos');
        else if (key === 't') insertFunction('tan');
        else if (key === 'l') insertFunction('ln');
        else if (key === 'g') insertFunction('log');
        else if (key === 'r') insertFunction('sqrt');
        else if (key === 'p') insertConstant('π');
        else if (key === 'a') insertAns();
    }
    
    // ======================== SERVICE WORKER REGISTRATION ======================
    function registerServiceWorker() {
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./service-worker.js')
                    .then(reg => console.log('✅ Service Worker registrado com sucesso:', reg))
                    .catch(err => console.error('❌ Falha ao registrar Service Worker:', err));
            });
        } else {
            console.log('Service Worker não suportado neste navegador');
        }
    }
    
    // ======================== INICIALIZAÇÃO ==========================
    function init() {
        buildButtons();
        initModeToggle();
        updateGreetingMessage();
        window.addEventListener('keydown', handleKeyboard);
        registerServiceWorker();
        // foco no display para melhor experiência
        if (display.value === "") display.value = "";
        console.log("✨ Calculadora Nexus carregada | modo RAD/DEG | Saudação personalizada | PWA pronta");
    }
    
    init();
</script>
</body>
  </html>
